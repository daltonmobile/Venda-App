<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neshehe Girls - Grade 3 Tshivenda</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');
:root{--card:#0b1220;--accent:#10b981;--muted:#94a3b8;--glass:rgba(255,255,255,0.04);}
*{box-sizing:border-box;}
body{font-family:Quicksand,system-ui,'Segoe UI',Arial;background:linear-gradient(180deg,#062024 0%,#07122a 100%);color:#e6eef1;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.app{width:100%;max-width:1100px;background:linear-gradient(180deg,rgba(255,255,255,0.03),rgba(255,255,255,0.02));box-shadow:0 10px 30px rgba(2,6,23,0.6);border-radius:14px;padding:18px;display:grid;grid-template-columns:340px 1fr;gap:18px;}
.sidebar{background:var(--card);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:12px;}
.profile{display:flex;gap:12px;align-items:center;}
.avatar{width:64px;height:64px;border-radius:12px;background:url('cover.jpeg') center/cover no-repeat;flex-shrink:0;}
h1{font-size:18px;margin:0;}p.lead{color:var(--muted);margin:0;font-size:14px;}
.card{background:var(--card);padding:14px;border-radius:12px;}
.btn{background:var(--glass);border:1px solid rgba(255,255,255,0.05);padding:8px 12px;border-radius:10px;cursor:pointer;color:#e6eef1;font-family:inherit;font-size:14px;transition:background 0.2s;}
.btn:hover{background:rgba(255,255,255,0.08);}
.btn.primary{background:linear-gradient(90deg,var(--accent),#06b6d4);color:#03121a;border:none;font-weight:600;}
.btn.active{background:var(--accent);color:#03121a;}
.topic-list{display:grid;gap:6px;margin-top:8px;max-height:380px;overflow-y:auto;}
.topic-item{background:rgba(255,255,255,0.02);padding:10px;border-radius:8px;cursor:pointer;transition:background 0.2s;}
.topic-item:hover{background:rgba(255,255,255,0.05);}
.slider{width:140px;}
.big{display:flex;flex-direction:column;gap:14px;}
.conv-card{background:rgba(255,255,255,0.02);padding:14px;border-radius:10px;margin-top:8px;}
.question-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
.q-label{color:var(--accent);font-weight:700;flex-shrink:0;}
.phonetic{font-size:12px;color:#06b6d4;font-style:italic;margin-top:3px;}
.response-group{margin-top:12px;display:grid;gap:8px;}
.response-item{background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;}
.resp-type{font-size:11px;color:#f59e0b;font-weight:600;margin-bottom:4px;}
.resp-row{display:flex;align-items:flex-start;gap:8px;}
.nav-buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;}
.status{color:var(--muted);font-size:12px;margin-top:6px;}
footer{font-size:12px;color:var(--muted);text-align:center;padding:8px;}
@media(max-width:720px){.app{grid-template-columns:1fr;}}
</style>
</head>

    <div class="card">

        <a href="index4.html" style="text-decoration:none"><button class="btn primary" style="width:100%;padding:14px">Grade 4 &#10145;</button></a>

    </div>
    <footer>Made with &#10084; for Mutodi's Princesses</footer>
  </main>
</div>

var rate=0.9,pitch=1.15;
function playAudio(url){if(!url){alert('Audio coming soon!');return;}var a=new Audio(url);a.playbackRate=rate;a.play().catch(function(){alert('Could not play audio. Check your internet connection.');});}
function setProfile(p){document.getElementById('profileName').textContent=p;}
function renderTopics(){var el=document.getElementById('topicsList');el.innerHTML='';CONVERSATIONS.forEach(function(c,i){var d=document.createElement('div');d.className='topic-item';d.innerHTML='<strong>'+c.topic+'</strong><div style="color:var(--muted);font-size:12px">'+c.question.english+'</div>';d.onclick=function(){document.querySelectorAll('.conv-block')[i].scrollIntoView({behavior:'smooth',block:'start'});};el.appendChild(d);});}
function renderConversations(){var el=document.getElementById('conversationsSection');el.innerHTML='';CONVERSATIONS.forEach(function(c){var card=document.createElement('div');card.className='card conv-block';var html='';if(c.img){html+='<img src="'+c.img+'" style="width:100%;height:160px;object-fit:cover;border-radius:8px;margin-bottom:12px" alt="'+c.topic+'">';}
html+='<div class="conv-card"><div class="question-row"><span class="q-label">Q:</span><div style="flex:1"><strong>'+c.question.venda+'</strong><div class="phonetic">'+c.question.syllables+' &bull; '+c.question.pron+'</div><div style="color:var(--muted);font-size:13px;margin-top:2px">'+c.question.english+'</div></div><button class="btn" onclick="playAudio(\''+c.question.audio+'\')">&#128266;</button></div>';
if(c.responses&&c.responses.length){html+='<div class="response-group">';c.responses.forEach(function(r){html+='<div class="response-item"><div class="resp-type">'+r.type+'</div><div class="resp-row"><div style="flex:1"><strong>'+r.venda+'</strong><div class="phonetic">'+r.syllables+' &bull; '+r.pron+'</div><div style="color:var(--muted);font-size:13px;margin-top:2px">'+r.english+'</div></div><button class="btn" onclick="playAudio(\''+r.audio+'\')">&#128266;</button></div></div>';});html+='</div>';}
html+='</div>';card.innerHTML=html;el.appendChild(card);});}
document.getElementById('maleBtn').addEventListener('click',function(){document.getElementById('maleBtn').classList.add('active');document.getElementById('femaleBtn').classList.remove('active');});
document.getElementById('femaleBtn').addEventListener('click',function(){document.getElementById('femaleBtn').classList.add('active');document.getElementById('maleBtn').classList.remove('active');});
document.getElementById('rate').addEventListener('input',function(e){rate=parseFloat(e.target.value);});
